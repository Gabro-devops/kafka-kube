{{- if .Values.monitoring.enabled }}
{{- if .Values.vault.enabled }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin-secret
  namespace: {{ include "kafka-lab.namespace" . }}
  labels:
    {{- include "kafka-lab.labels" . | nindent 4 }}
    app.kubernetes.io/component: monitoring
spec:
  refreshInterval: {{ .Values.vault.refreshInterval | default "1h" }}
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: grafana-admin-secret
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        admin-password: "{{ `{{ .password }}` }}"
  data:
    - secretKey: password
      remoteRef:
        key: {{ .Values.monitoring.grafana.vaultSecretPath }}
        property: password
{{- end }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: {{ include "kafka-lab.namespace" . }}
  labels:
    {{- include "kafka-lab.labels" . | nindent 4 }}
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: {{ include "kafka-lab.namespace" . }}
  labels:
    {{- include "kafka-lab.labels" . | nindent 4 }}
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'kafka'
        orgId: 1
        folder: 'Kafka'
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-kafka-dashboard
  namespace: {{ include "kafka-lab.namespace" . }}
  labels:
    {{- include "kafka-lab.labels" . | nindent 4 }}
data:
  kafka-dashboard.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "gnetId": 7589,
      "graphTooltip": 0,
      "panels": [
        {
          "datasource": "Prometheus",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "id": 1,
          "targets": [
            {
              "expr": "sum(rate(kafka_server_brokertopicmetrics_messagesin_total[5m])) by (topic)",
              "legendFormat": "{{ `{{topic}}` }}",
              "refId": "A"
            }
          ],
          "title": "Messages In Per Second",
          "type": "graph"
        },
        {
          "datasource": "Prometheus",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "id": 2,
          "targets": [
            {
              "expr": "sum(rate(kafka_server_brokertopicmetrics_bytesin_total[5m])) by (topic)",
              "legendFormat": "{{ `{{topic}}` }}",
              "refId": "A"
            }
          ],
          "title": "Bytes In Per Second",
          "type": "graph"
        },
        {
          "datasource": "Prometheus",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "id": 3,
          "targets": [
            {
              "expr": "sum(kafka_consumergroup_lag) by (consumergroup, topic)",
              "legendFormat": "{{ `{{consumergroup}} - {{topic}}` }}",
              "refId": "A"
            }
          ],
          "title": "Consumer Group Lag",
          "type": "graph"
        },
        {
          "datasource": "Prometheus",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "id": 4,
          "targets": [
            {
              "expr": "count(kafka_topic_partitions) by (topic)",
              "legendFormat": "{{ `{{topic}}` }}",
              "refId": "A"
            }
          ],
          "title": "Topic Partitions",
          "type": "graph"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 18,
      "style": "dark",
      "tags": ["kafka"],
      "time": {"from": "now-1h", "to": "now"},
      "title": "Kafka Overview",
      "uid": "kafka-overview",
      "version": 1
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: {{ include "kafka-lab.namespace" . }}
  labels:
    app: grafana
    {{- include "kafka-lab.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: {{ .Values.monitoring.grafana.image }}
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              {{- if .Values.vault.enabled }}
              valueFrom:
                secretKeyRef:
                  name: grafana-admin-secret
                  key: admin-password
              {{- else }}
              value: "changeme"
              {{- end }}
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH
              value: "/var/lib/grafana/dashboards/kafka-dashboard.json"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: kafka-dashboard
              mountPath: /var/lib/grafana/dashboards
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: kafka-dashboard
          configMap:
            name: grafana-kafka-dashboard
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: {{ include "kafka-lab.namespace" . }}
  labels:
    app: grafana
    {{- include "kafka-lab.labels" . | nindent 4 }}
spec:
  type: {{ .Values.monitoring.grafana.service.type }}
  ports:
    - port: 3000
      targetPort: 3000
      {{- if eq .Values.monitoring.grafana.service.type "NodePort" }}
      nodePort: {{ .Values.monitoring.grafana.service.nodePort }}
      {{- end }}
  selector:
    app: grafana
{{- end }}
