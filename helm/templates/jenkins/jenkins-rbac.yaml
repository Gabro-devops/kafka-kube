apiVersion: v1
kind: ServiceAccount
metadata:
  name: jenkins-admin
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app: jenkins
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jenkins-admin-role
  namespace: {{ .Release.Namespace | quote }}
rules:
  - apiGroups: ["kafka.strimzi.io"]
    resources: ["kafkatopics", "kafkausers", "kafkaconnectors", "kafkarebalances", "kafkas"]
    verbs: ["*"]
  - apiGroups: [""]
    resources: ["secrets", "configmaps", "pods", "pods/exec", "pods/log", "services"]
    verbs: ["*"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jenkins-admin-binding
  namespace: {{ .Release.Namespace | quote }}
subjects:
  - kind: ServiceAccount
    name: jenkins-admin
    namespace: {{ .Release.Namespace | quote }}
roleRef:
  kind: Role
  name: jenkins-admin-role
  apiGroup: rbac.authorization.k8s.io
